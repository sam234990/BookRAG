# configs/default.yaml

pdf_path: TODO
save_path: TODO
parser: docling

llm:
  model_name: qwen3.5-35b-a3b
  api_key: env
  api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
  backend: openai
  max_tokens: 8000
  temperature: 0.1
  frequency_penalty: 0.0
  presence_penalty: 0.0
  max_workers: 4


vlm:
  model_name: qwen3.5-35b-a3b
  api_key: env
  api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
  temperature: 0.1
  max_tokens: 6000
  backend: gpt

index:
  chunk_size: 512
  overlap: 50

mineru:
  backend: vlm-sglang-client
  method: vlm
  server_url: http://localhost:30000
  lang: en

tree:
  node_keywords: True
  node_summary: True

graph:
  extractor_type: "llm"
  local_model_name: "en_core_web_sm"
  image_description_force: True
  max_gleaning: 1
  refine_type: "advanced"
  embedding_config:
    model_name: text-embedding-v3
    backend: openai
    api_key: env
    max_length: 4096
    device: "cpu"
    api_base: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
  reranker_config:
    model_name: jina-reranker-v3
    max_length: 4096
    device: "cpu"
    backend: jina
    api_base: "https://api.jina.ai/v1/rerank"
    api_key: env


vdb:
  mm_embedding: True
  vdb_dir_name: "Tree_vdb"
  collection_name: "TreeVDB"
  embedding_config:
    model_name: Alibaba-NLP/gme-Qwen2-VL-2B-Instruct
    device: "cuda:1"

rag_force_reprocess: True

rag:
  strategy: gbc
  varient: standard
  topk: 10
  sim_threshold: 0.3
  select_depth: 2
  max_retry: 2
  reranker_config:
    model_name: jina-reranker-v3
    max_length: 4096
    device: "cpu"
    backend: jina
    api_base: "https://api.jina.ai/v1/rerank"
    api_key: env
  mm_reranker_config:
    model_name: Alibaba-NLP/gme-Qwen2-VL-2B-Instruct
    device: "cuda:2"
